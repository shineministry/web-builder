<!DOCTYPE html>
<html>

<head>
<title>Shine Builder</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header>
<h2>Shine Website Builder</h2>
</header>

<div class="editor">

<div class="left-panel">
<h3>Elements</h3>

<button draggable="true" ondragstart="drag(event)" data-type="heading">Heading</button>
<button draggable="true" ondragstart="drag(event)" data-type="text">Text</button>
<button draggable="true" ondragstart="drag(event)" data-type="image">Image</button>
<button draggable="true" ondragstart="drag(event)" data-type="button">Button</button>
<button draggable="true" ondragstart="drag(event)" data-type="video">Video</button>

</div>

<div id="canvas" ondrop="drop(event)" ondragover="allowDrop(event)"></div>

<div class="right-panel">
<h3>Settings</h3>

<label>Text</label>
<input id="textEdit">

<label>Color</label>
<input type="color" id="colorEdit">

<button onclick="applyChanges()">Apply</button>

<button onclick="deleteElement()">Delete</button>

</div>

</div>

<button class="export" onclick="exportSite()">Export Website</button>

<script src="script.js"></script>

</body>
</html>
